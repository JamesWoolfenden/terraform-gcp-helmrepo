---
# yamllint disable rule:line-length
default_language_version:
  python: python3.11
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0 # v6.0.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: pretty-format-json
        args:
          - --autofix
      - id: detect-private-key
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6 # v1.5.6
    hooks:
      - id: forbid-tabs
        exclude_types: [python, javascript, dtd, markdown, makefile, xml]
        exclude: binary|\.bin$
  - repo: https://github.com/jameswoolfenden/pre-commit-shell
    rev: 0.0.2 # v1.0.6
    hooks:
      - id: shell-lint
        exclude: template|\.template$
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0 # v0.48.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/jameswoolfenden/pre-commit
    rev: v0.1.56 # v0.1.53
    hooks:
      - id: terraform-fmt
        language_version: python3.11
      - id: tf2docs
        language_version: python3.11
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.526 # 3.2.526
    hooks:
      - id: checkov
        files: .
        verbose: true
        entry: checkov -d example/examplea --external-checks-dir checkov --download-external-modules true --compact
  - repo: https://github.com/jameswoolfenden/pike
    rev: v0.4.1 # v0.4.1
    hooks:
      - id: pike-docs-go
        args: ["readme","-d", ".", "-i"]
  - repo: https://github.com/jameswoolfenden/ghat
    rev: v0.1.27 # v0.1.23
    hooks:
      - id: ghat-go
        args: ["swot","-d", "."]
