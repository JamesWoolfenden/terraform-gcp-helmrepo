default_language_version:
    python: python3.11
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
    -   id: check-json
    -   id: check-merge-conflict
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: pretty-format-json
        args:
        - --autofix
    -   id: detect-private-key
-   repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8 # v1.5.6
    hooks:
    -   id: forbid-tabs
        exclude_types:
        - python
        - javascript
        - dtd
        - markdown
        - makefile
        - xml
        exclude: binary|\.bin$
-   repo: https://github.com/jameswoolfenden/pre-commit-shell
    rev: 062f0b028ae65827e04f91c1e6738cfcbe9b337f # v1.0.6
    hooks:
    -   id: shell-lint
        exclude: template|\.template$
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e # v0.48.0
    hooks:
    -   id: markdownlint
-   repo: https://github.com/jameswoolfenden/pre-commit
    rev: c5bdf92051a9e574d62152d81a3bd98a71816dd3 # v0.1.62
    hooks:
    -   id: terraform-fmt
        language_version: python3.11
    -   id: tf2docs
        language_version: python3.11
-   repo: https://github.com/bridgecrewio/checkov
    rev: 062b60e4b299bc621f11a01a577274db0805e552 # 3.2.533
    hooks:
    -   id: checkov
        files: .
        verbose: true
        entry: checkov -d example/examplea --external-checks-dir checkov --download-external-modules true --compact
-   repo: https://github.com/jameswoolfenden/pike
    rev: 4caef3be76b752412521afa4cc795211766774b2 # v1.0.0
    hooks:
    -   id: pike-docs-go
        args: ["readme","-d", ".", "-i"]
-   repo: 'https://github.com/rhysd/actionlint'
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca
    hooks:
      - id: actionlint
-   repo: https://github.com/jameswoolfenden/ghat
    rev: 1a9c41d5197dcbce3cb81b3a88d2762086079a1d # v0.1.34
    hooks:
    -   id: ghat-go
    -   id: ghat-go-sift
